<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>SocialConnect — Manage All Social Media in One Click</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <div class="stage">
    <div class="device" id="device">
      <div class="statusbar">
        <span class="time">9:41</span>
        <span class="status-right">
          <i class="bi bi-reception-4"></i>
          <i class="bi bi-wifi"></i>
          <i class="bi bi-battery-full"></i>
        </span>
      </div>
      <div id="app" class="app-root"></div>
      <nav id="bottomNav" class="bottom-nav" hidden>
        <a data-nav="dashboard" class="nav-item"><i class="bi bi-house"></i><span>Home</span></a>
        <a data-nav="calendar" class="nav-item"><i class="bi bi-calendar4"></i><span>Calendar</span></a>
        <a data-nav="create-post" class="nav-fab"><i class="bi bi-plus-lg"></i></a>
        <a data-nav="analytics" class="nav-item"><i class="bi bi-bar-chart"></i><span>Analytics</span></a>
        <a data-nav="profile" class="nav-item"><i class="bi bi-person"></i><span>Profile</span></a>
      </nav>
    </div>
  </div>
  <script src="./assets/js/dummy-data.js"></script>
  <script src="./assets/js/router.js"></script>
  <script src="./assets/js/app.js"></script>
