<div class="appbar">
  <div><div class="title">Calendar</div><div class="subtitle">Plan & schedule</div></div>
  <div class="appbar-actions">
    <button class="icon-btn"><i class="bi bi-search"></i></button>
    <button class="icon-btn"><i class="bi bi-funnel"></i></button>
    <button class="btn btn-primary btn-sm" data-nav="create-post"><span>Create Post</span> <i class="bi bi-plus-lg"></i></button>
  </div>
</div>

<div class="seg-tabs">
  <div class="seg-tab active" data-seg="cal"><i class="bi bi-calendar4"></i> Calendar</div>
  <div class="seg-tab" data-seg="list"><i class="bi bi-list-ul"></i> List</div>
  <div class="seg-tab" data-seg="drafts"><i class="bi bi-file-earmark"></i> Drafts</div>
  <div class="seg-tab" data-seg="queue"><i class="bi bi-stack"></i> Queue</div>
</div>

<div class="page">
  <div class="cal-head">
    <button class="cal-nav"><i class="bi bi-chevron-left"></i></button>
    <div class="cal-month">July 2026 <i class="bi bi-chevron-down"></i></div>
    <button class="cal-today">Today</button>
  </div>
  <div id="calGrid" class="cal-grid"></div>

  <div class="legend">
    <div class="l"><span class="sw" style="background:var(--yellow)"></span>Scheduled</div>
    <div class="l"><span class="sw" style="background:var(--info)"></span>Published</div>
    <div class="l"><span class="sw" style="background:var(--success)"></span>Completed</div>
    <div class="l"><span class="sw" style="background:#8B5CF6"></span>Draft</div>
    <div class="count">4 Posts</div>
  </div>

  <div class="section-title mt-5"><div class="t h3">Scheduled Posts</div><a class="a">View List <i class="bi bi-chevron-right"></i></a></div>
  <div id="schedList"></div>
</div>
