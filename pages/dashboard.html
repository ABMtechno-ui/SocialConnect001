<div class="header-top">
  <button class="hamburger"><i class="bi bi-list"></i></button>
  <div class="logo">
    <div class="logo-mark"><i class="bi bi-arrow-up-right"></i></div>
    SocialConnect
  </div>
  <div class="actions">
    <button class="icon-btn"><i class="bi bi-bell"></i></button>
    <div class="avatar">A</div>
  </div>
</div>
<div class="page">
  <div class="greeting">
    <div>
      <div id="greetName" class="name">Good Morning 👋</div>
      <div class="sub">Here's what's happening</div>
    </div>
    <button
      class="btn btn-primary btn-sm"
      data-nav="create-post"
      style="height: 44px"
    >
      <i class="bi bi-plus-lg"></i> Create Post
    </button>
  </div>

  <div class="overview-card">
    <div class="section-title">
      <div class="t">Overview</div>
      <div class="a">This Week <i class="bi bi-chevron-down"></i></div>
    </div>

    <div id="overview" class="overview-grid"></div>
  </div>

  <div class="card mt-3">
    <div class="section-title">
      <div class="t">Connected Accounts</div>
      <a class="a" data-nav="accounts"
        >View All <i class="bi bi-chevron-right"></i
      ></a>
    </div>
    <div id="accountsMini" class="acc-row"></div>
  </div>

  <div class="card mt-3">
    <div class="section-title">
      <div class="t">Today's Schedule</div>
      <a class="a" data-nav="calendar">View Calendar</a>
    </div>
    <div id="todayList"></div>
  </div>

  <div class="card mt-3">
    <div class="section-title">
      <div class="t">Recent Activity</div>
      <a class="a">View All</a>
    </div>
    <div id="activityList"></div>
  </div>
</div>
