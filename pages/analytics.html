<div class="appbar">
  <div><div class="title">Analytics</div><div class="subtitle">Insights across all your accounts.</div></div>
  <div class="appbar-actions">
    <button class="icon-btn"><i class="bi bi-funnel"></i></button>
    <button class="icon-btn"><i class="bi bi-download"></i></button>
  </div>
</div>
<div class="page">
  <div id="aStats" class="a-stats"></div>

  <div class="chart-box">
    <div class="chart-title"><div class="t">Reach &amp; Engagement</div><div class="sel">Last 30 Days <i class="bi bi-chevron-down"></i></div></div>
    <div id="lineChart"></div>
  </div>

  <div class="chart-box">
    <div class="chart-title"><div class="t">Posts per Day</div><div class="sel">This Week <i class="bi bi-chevron-down"></i></div></div>
    <div id="barChart"></div>
  </div>

  <div class="chart-box">
    <div class="chart-title"><div class="t">Platform Breakdown</div><div class="sel">All Time</div></div>
    <div id="platBreak"></div>
  </div>

  <div class="chart-box">
    <div class="chart-title"><div class="t">Top Posts</div><a class="link-yellow tiny">View All</a></div>
    <div id="topPosts"></div>
  </div>

  <div class="chart-box">
    <div class="chart-title"><div class="t">Best Posting Time</div><div class="sel">Weekly</div></div>
    <div class="tiny muted">Darker cells indicate higher engagement.</div>
    <div id="heat" class="heat"></div>
    <div class="row between mt-3 tiny muted"><span>Mon–Sun</span><span>Peak: Fri 6PM</span></div>
  </div>
</div>
