<div class="page">
  <button class="back-btn" data-back><i class="bi bi-arrow-left"></i></button>
  <div class="auth-title">Create <span class="accent">Account</span></div>
  <p class="auth-sub">Join SocialConnect and start managing your social media in one place.</p>

  <div class="field"><label class="label">Full Name</label>
    <div class="input-wrap"><i class="bi bi-person input-icon"></i>
    <input class="input" placeholder="Enter your full name"/></div></div>

  <div class="field"><label class="label">Email Address</label>
    <div class="input-wrap"><i class="bi bi-envelope input-icon"></i>
    <input class="input" placeholder="Enter your email address"/></div></div>

  <div class="field"><label class="label">Password</label>
    <div class="input-wrap"><i class="bi bi-lock input-icon"></i>
    <input class="input" type="password" placeholder="Enter your password"/>
    <i class="bi bi-eye-slash input-suffix"></i></div>
    <div class="row between mt-2 tiny"><span class="muted">Password strength: <strong style="color:var(--warning)">Medium</strong></span></div>
    <div class="password-strength"><span class="on"></span><span class="on"></span><span></span></div>
  </div>

  <div class="field"><label class="label">Confirm Password</label>
    <div class="input-wrap"><i class="bi bi-lock input-icon"></i>
    <input class="input" type="password" placeholder="Confirm your password"/>
    <i class="bi bi-eye-slash input-suffix"></i></div></div>

  <label class="checkbox mb-4"><input type="checkbox"/> I agree to the <strong>Terms of Service</strong> and <strong>Privacy Policy</strong></label>

  <button class="btn btn-primary" data-nav="verify">Create Account <i class="bi bi-arrow-right"></i></button>
  <div class="mt-3"></div>
  <button class="btn btn-secondary" data-nav="login">Already have an account? <span class="accent" style="margin-left:6px">Login</span></button>
  <p class="tiny muted text-center mt-4"><i class="bi bi-lock"></i> Your data is safe and secure with us.</p>
</div>
