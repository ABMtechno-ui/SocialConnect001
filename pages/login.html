<div class="page">
  <button class="back-btn" data-back><i class="bi bi-arrow-left"></i></button>
  <div class="row between" style="align-items:flex-start">
    <div style="flex:1">
      <div class="auth-title">Welcome <span class="accent">Back</span></div>
      <p class="auth-sub">Login to continue managing your social media accounts.</p>
    </div>
    <div class="hero-mark" style="width:80px;height:80px;margin-top:20px"><div class="pin" style="width:36px;height:36px;font-size:18px;top:-16px"><i class="bi bi-arrow-up-right"></i></div></div>
  </div>

  <div class="field"><label class="label">Email Address</label>
    <div class="input-wrap"><i class="bi bi-envelope input-icon"></i>
    <input class="input" placeholder="Enter your email address"/></div></div>

  <div class="field">
    <div class="row between mb-2"><label class="label" style="margin:0">Password</label>
      <a class="link-yellow tiny" data-nav="forgot-password">Forgot Password?</a></div>
    <div class="input-wrap"><i class="bi bi-lock input-icon"></i>
    <input class="input" type="password" placeholder="Enter your password"/>
    <i class="bi bi-eye-slash input-suffix"></i></div>
  </div>

  <div class="row between mb-4">
    <label class="checkbox"><input type="checkbox"/> Remember me</label>
    <span class="tiny muted">Keep me signed in <i class="bi bi-info-circle"></i></span>
  </div>

  <button class="btn btn-primary" data-nav="dashboard">Login <i class="bi bi-arrow-right"></i></button>

  <div class="divider-or">or continue with</div>
  <div class="social-grid">
    <button class="social-btn" style="color:#1877F2"><i class="bi bi-facebook"></i></button>
    <button class="social-btn"><i class="bi bi-google" style="color:#EA4335"></i></button>
    <button class="social-btn" style="color:#0A66C2"><i class="bi bi-linkedin"></i></button>
    <button class="social-btn" style="color:#1DA1F2"><i class="bi bi-twitter"></i></button>
    <button class="social-btn"><i class="bi bi-apple"></i></button>
  </div>
  <p class="footer-line">Don't have an account? <a class="link-yellow" data-nav="register">Create Account</a></p>
  <p class="tiny muted text-center mt-4"><i class="bi bi-lock"></i> Your data is safe and secure with us.</p>
</div>
