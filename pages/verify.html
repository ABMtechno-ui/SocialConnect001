<div class="page">
  <button class="back-btn" data-back><i class="bi bi-arrow-left"></i></button>
  <div class="hero-illus"><div class="square"><div class="pin"><i class="bi bi-check-lg"></i></div></div></div>
  <div class="h1 text-center">Verify Your <span class="accent">Email</span></div>
  <p class="auth-sub text-center mt-3">We've sent a verification code to your email address</p>
  <div class="otp-mail">
    <i class="bi bi-envelope"></i> john.doe@example.com
    <span class="change"><i class="bi bi-pencil"></i> Change</span>
  </div>
  <div class="otp-grid">
    <div class="otp-cell active">4</div>
    <div class="otp-cell">7</div>
    <div class="otp-cell">2</div>
    <div class="otp-cell">9</div>
    <div class="otp-cell">1</div>
    <div class="otp-cell">5</div>
  </div>
  <div class="otp-hint">Enter the 6-digit code sent to your email</div>
  <div class="timer-card">
    <i class="bi bi-clock"></i>
    <div><div class="t">Didn't receive the code?</div><div class="d">You can request a new code in <strong>00:32</strong></div></div>
    <button class="resend">Resend Code</button>
  </div>
  <button class="btn btn-primary" data-nav="dashboard">Verify &amp; Continue <i class="bi bi-arrow-right"></i></button>
  <p class="tiny muted text-center mt-4"><i class="bi bi-shield-check"></i> Your account is safe and secure with us.</p>
</div>
