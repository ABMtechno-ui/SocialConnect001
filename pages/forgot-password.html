<div class="page">
  <button class="back-btn" data-back><i class="bi bi-arrow-left"></i></button>
  <div class="row between" style="align-items:flex-start">
    <div style="flex:1">
      <div class="auth-title">Forgot <span class="accent">Password?</span></div>
      <p class="auth-sub">No worries! Enter your email address and we'll send you a code to reset your password.</p>
    </div>
    <div class="hero-mark" style="width:88px;height:88px;background:#fff;border:1px solid var(--border);margin-top:20px">
      <i class="bi bi-envelope-paper" style="font-size:36px"></i>
    </div>
  </div>

  <div class="field"><label class="label">Email Address</label>
    <div class="input-wrap"><i class="bi bi-envelope input-icon"></i>
    <input class="input" placeholder="Enter your email address"/></div></div>

  <button class="btn btn-primary" data-nav="verify">Send Reset Code <i class="bi bi-arrow-right"></i></button>
  <div class="divider-or">or</div>
  <button class="btn btn-secondary" data-nav="login">Back to Login</button>

  <div class="security-note">
    <i class="bi bi-shield-check"></i>
    <div><div class="t">Secure &amp; Safe</div><div class="d">We never share your information with anyone. Your data is 100% secure with us.</div></div>
  </div>
  <p class="footer-line">Remember your password? <a class="link-yellow" data-nav="login">Login</a></p>
</div>
